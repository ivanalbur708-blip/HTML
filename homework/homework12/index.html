<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Credit Card Details</title>
    <style>
        body {
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
}

.credit-card {
    background-color: #96c5c5;
    width: 500px;
    border-radius: 10px;
    padding-bottom: 30px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.card-header {
    background-color: #e66a2e;
    color: white;
    padding: 12px 25px;
    font-weight: bold;
    width: 70%;
    margin-top: 30px;
    margin-bottom: 25px;
}

.card-form {
    padding: 0 40px;
    position: relative;
    z-index: 2;
}

.field-group {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.field-group label {
    color: #5a7d7d;
    font-size: 11px;
    margin-bottom: 5px;
}

.field-group input {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-bottom: 1px solid #5a7d7d;
    padding: 8px 5px;
    color: #3e5a5a;
    outline: none;
}

.field-group input::placeholder {
    color: rgba(62, 90, 90, 0.5);
}

.row {
    display: flex;
    gap: 30px;
}

.expire-inputs {
    display: flex;
    gap: 15px;
}

.expire-inputs input {
    width: 60px;
}

.csv-group input {
    width: 70px;
}

.card-decoration {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #f1c40f 20%, #2c3e50 21%, #2c3e50 100%);
    border-top-left-radius: 100%;
    opacity: 0.8;
}
    </style>
</head>
<body>
    <div class="card-container">
        <div class="credit-card">
            <div class="card-header">CREDIT CARD DETAILS</div>
            <form class="card-form">
                <div class="field-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456">
                </div>
                <div class="field-group">
                    <label>Name On Card</label>
                    <input type="text" placeholder="Name Surname">
                </div>
                <div class="row">
                    <div class="field-group">
                        <label>Expire Date</label>
                        <div class="expire-inputs">
                            <input type="text" placeholder="02">
                            <input type="text" placeholder="2017">
                        </div>
                    </div>
                    <div class="field-group csv-group">
                        <label>CSV No.</label>
                        <input type="text" placeholder="***">
                    </div>
                </div>
            </form>
            <div class="card-decoration"></div>
        </div>
    </div>
</body>
</html>
