<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>UI Library</title>
    <style>
       body {
    background-color: #f5f5f5;
    font-family: sans-serif;
    padding: 40px;
}

.demo-page {
    background: white;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
}

section { margin-bottom: 30px; }
h3 { margin-bottom: 15px; color: #333; }
.row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }


.ui-input {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    outline: none;
}

.input-wrapper { position: relative; }
.input-wrapper.valid .ui-input { border-color: #4caf50; color: #4caf50; }
.input-wrapper.invalid .ui-input { border-color: #f44336; color: #f44336; }
.status-icon {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
}
.valid .status-icon { color: #4caf50; }
.invalid .status-icon { color: #f44336; }


.ui-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.ui-toggle input { display: none; }
.slider {
    width: 40px;
    height: 20px;
    background: #ccc;
    border-radius: 20px;
    position: relative;
    transition: .3s;
}

.slider:before {
    content: "";
    position: absolute;
    height: 14px;
    width: 14px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: .3s;
}

input:checked + .slider { background: #4caf50; }
input:checked + .slider.red { background: #f44336; }
input:checked + .slider:before { transform: translateX(20px); }


.ui-radio {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

.radio-mark {
    width: 18px;
    height: 18px;
    border: 2px solid #ccc;
    border-radius: 50%;
    display: inline-block;
    position: relative;
}

input:checked + .radio-mark { border-color: #4caf50; }
input:checked + .radio-mark:after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: #4caf50;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.ui-radio input { display: none; }


.btn {
    padding: 10px 25px;
    border: none;
    border-radius: 4px;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.btn-green { background: #4caf50; }
.btn-green:hover, .btn-green-hover { background: #2e7d32; }

.btn-red { background: #f44336; }
.btn-red:hover, .btn-red-hover { background: #c62828; }

.btn-disabled { background: #9e9e9e; cursor: not-allowed; }

.btn-round {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.ui-textarea {
    width: 100%;
    height: 100px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    resize: none;
    outline: none;
}
    </style>
</head>
<body>
    <div class="demo-page">
        <section>
            <h3>Inputs</h3>
            <div class="row">
                <input type="text" class="ui-input" placeholder="Enter some text">
                <div class="input-wrapper valid">
                    <input type="text" class="ui-input" value="valid text">
                    <span class="status-icon">✔</span>
                </div>
                <div class="input-wrapper invalid">
                    <input type="text" class="ui-input" value="invalid text">
                    <span class="status-icon">✖</span>
                </div>
            </div>
        </section>

        <section>
            <h3>Check boxes</h3>
            <div class="row">
                <label class="ui-toggle">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                    Subscribe
                </label>
                <label class="ui-toggle">
                    <input type="checkbox">
                    <span class="slider red"></span>
                    Subscribe
                </label>
            </div>
        </section>

        <section>
            <h3>Radio buttons</h3>
            <div class="row">
                Gender:
                <label class="ui-radio">
                    <input type="radio" name="gender" checked>
                    <span class="radio-mark"></span> Male
                </label>
                <label class="ui-radio">
                    <input type="radio" name="gender">
                    <span class="radio-mark"></span> Female
                </label>
            </div>
        </section>

        <section>
            <h3>Buttons</h3>
            <div class="row">
                <button class="btn btn-green">Active</button>
                <button class="btn btn-green-hover">Hover</button>
                <button class="btn btn-red">Danger</button>
                <button class="btn btn-red-hover">Hover</button>
                <button class="btn btn-disabled" disabled>Disabled</button>
                <button class="btn-round btn-green">+</button>
                <button class="btn-round btn-red">-</button>
            </div>
        </section>

        <section>
            <h3>Text area</h3>
            <textarea class="ui-textarea" placeholder="Enter some text..."></textarea>
        </section>
    </div>
</body>
</html>
