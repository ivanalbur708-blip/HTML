<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Таблиця з фіксацією</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }


        div {
            max-width: 100%;
            max-height: 400px;
            overflow: auto;
            border: 1px solid #ccc;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px 20px;
            text-align: center;
            white-space: nowrap;
        }


        thead th {
            position: sticky;
            top: 0;
            background-color: #add8e6;
            z-index: 2;
        }


        tbody td:first-child,
        thead th:first-child {
            position: sticky;
            left: 0;
            background-color: #add8e6;
            z-index: 2;
            font-weight: bold;
        }


        thead th:first-child {
            z-index: 3;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }


        td:nth-child(n+2) {
            color: #555;
        }
    </style>
</head>

<body>

    <div>
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>Header 1</th>
                    <th>Header 2</th>
                    <th>Header 3</th>
                    <th>Header 4</th>
                    <th>Header 5</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Line 1</td>
                    <td>23</td>
                    <td>123</td>
                    <td>43</td>
                    <td>12</td>
                    <td>76</td>
                </tr>
                <tr>

                    <td>12</td>
                    <td>76</td>
                </tr>
                <tr>

                    <td>7</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>Line 4</td>
                    <td>23</td>
                    <td>23</td>
                    <td>23</td>
                    <td>23</td>
                    <td>23</td>
                </tr>

    </div>

</body>

</html>
