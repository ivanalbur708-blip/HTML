<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Homework 10</title>
        <style>
            * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background-color: #f0f0f0;
    padding: 20px;
}

.article-card {
    background-color: #004d40;
    color: white;
    padding: 40px;
    max-width: 900px;
    margin: 0 auto;
}

.breadcrumbs {
    color: #80cbc4;
    font-size: 14px;
    margin-bottom: 20px;
}

.title {
    font-size: 36px;
    line-height: 1.2;
    margin-bottom: 40px;
    max-width: 500px;
}

.meta-container {
    display: flex;
    align-items: center;
    gap: 20px;
}

.avatar img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: #fff;
    border: 2px solid #ffca28;
}

.info-grid {
    display: flex;
    gap: 30px;
}

.info-item {
    display: flex;
    flex-direction: column;
}

.label {
    font-size: 12px;
    color: #80cbc4;
    margin-bottom: 4px;
}

.value {
    font-size: 14px;
    font-weight: bold;
}

.link {
    color: white;
    text-decoration: underline;
}

@media (max-width: 600px) {
    .article-card {
        padding: 30px 20px;
    }

    .title {
        font-size: 28px;
        margin-bottom: 30px;
    }

    .meta-container {
        align-items: flex-start;
    }

    .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }


    .info-item:nth-child(4) {
        order: 1;
    }

    .info-item:nth-child(1) {
        order: 2;
    }

    .info-item:nth-child(2) {
        order: 3;
    }

    .info-item:nth-child(3) {
        order: 4;
    }
}
        </style>
</head>

<body>
    <div class="article-card">
        <nav class="breadcrumbs">Home / Articles /</nav>
        
        <h1 class="title">The Difference Between Responsive and Adaptive Design</h1>

        <div class="meta-container">
            <div class="avatar">
                <img src="../../shade_resurses/account.png" alt="Author Avatar">
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">Author</span>
                    <span class="value">Geoff Graham</span>
                </div>
                <div class="info-item">
                    <span class="label">49 Comments</span>
                    <a href="#" class="value link">Go to comments</a>
                </div>
                <div class="info-item">
                    <span class="label">Published</span>
                    <span class="value">Nov 11, 2018</span>
                </div>
                <div class="info-item">
                    <span class="label">Updated</span>
                    <span class="value">Nov 17, 2018</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
