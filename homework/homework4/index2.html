<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Vertical Menu</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f2f2;
}

.menu{
    width:220px;
    margin:50px auto;
    background:#8a8a8a;
}

.menu-item{
    padding:15px;
    color:white;
}

.menu-item img{
    width:24px;
    position: relative;
    top: 3px;
    margin-right:15px;
}

.menu-item:hover{
    background:#5f5f5f;
}

</style>
</head>

<body>

<div class="menu">

<div class="menu-item">
<img src="../../shade_resurses/edit.png">
<span>EDIT</span>
</div>

<div class="menu-item">
<img src="../../shade_resurses/favorites.png">
<span>FAVORITES</span>
</div>

<div class="menu-item">
<img src="../../shade_resurses/history.png">
<span>HISTORY</span>
</div>

<div class="menu-item">
<img src="../../shade_resurses/security.png">
<span>SECURITY</span>
</div>

<div class="menu-item">
<img src="../../shade_resurses/settings.png">
<span>SETTINGS</span>
</div>

</div>

</body>
</html>
