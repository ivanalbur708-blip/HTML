<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Структура сайту</title>

<style>

body{
    font-family: Arial;
    background:#eeeeee;
}

header{
    background:#8a2d4f;
    color:white;
    text-align:center;
    padding:20px;
    margin-bottom:10px;
}

nav{
    background:#6e1838;
    color:white;
    text-align:center;
    padding:15px;
    margin-bottom:10px;
}

.left{
    float:left;
    width:20%;
}

aside{
    background:#c56a8b;
    padding:20px;
    margin-bottom:10px;
    text-align:center;
}

.right{
    float:right;
    width:20%;
    height:240px;
}

main{
    float:left;
    width:55%;
    background:#b45576;
    padding:20px;
    margin:0 2%;
}

section{
    background:#d99bb0;
    padding:30px;
    margin-bottom:15px;
    text-align:center;
}

footer{
    clear:both;
    background:#6e1838;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:10px;
}

</style>
</head>

<body>

<header>
HEADER
</header>

<nav>
MENU
</nav>

<div class="left">
<aside>ASIDE 1</aside>
<aside>ASIDE 2</aside>
</div>

<main>
MAIN CONTENT

<section>SECTION 1</section>
<section>SECTION 2</section>

</main>

<aside class="right">
ASIDE 3
</aside>

<footer>
FOOTER
</footer>

</body>
</html>
