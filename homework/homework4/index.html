<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What do I have in my fridge?</title>

<style>

body {
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    margin: 0;
    padding: 20px;
    text-align: center;
}

h2 {
    font-size: 18px;
    font-weight: bold;
    color: #000;
    margin-bottom: 20px;
}

.fridge-container {
    background-color: #f5f5f5;
    border: 1px solid #dcdcdc;
    border-radius: 8px;
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

.product-item {
    background-color: #ffffff;
    border: 1px solid #a9a9a9;
    border-radius: 15px;
    width: 140px;
    height: 140px;
    margin: 10px;
    display: inline-block;
    vertical-align: top;
}

.product-item img {
    width: 60px;
    height: 60px;
    margin-top: 20px;
}

.product-item span {
    display: block;
    font-size: 14px;
    margin-top: 10px;
}

.footer-text {
    margin-top: 15px;
    font-size: 12px;
}

</style>
</head>

<body>
