<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 12</title>
    <style>
        .grid-con {
            width: 80vw;

            margin: 1.3em auto;
            padding: 1.1em;

            background-color: cadetblue;

            display: grid;
            /* grid-template-columns: auto auto auto; */
            /* grid-template-columns: auto auto auto auto; */
            /* grid-template-columns: 100px 30vw 35% 4em; */
            /* width / 7 */
            /* grid-template-columns: 1fr 2fr 1fr 3fr;  */
            /* (width - 100px - 3em - 30%) / 3 */
            /* grid-template-columns: 100px 3em 1fr 30% 2fr; */
            grid-template-columns: repeat(4, 1fr);
            /* grid-template-rows: 100px 30vh; */
            /* column-gap: 1.1em; */
            /* row-gap: 0.3em; */
            /* gap: row column; */
            gap: 0.2em 1.1em;
        }

        .grid-con div:nth-child(1) {
            /* grid-column-start: 1;
            grid-column-end: 4; */
            /* grid-column: 1 / span 3;
            grid-row: 1 / span 2; */
            /* grid-area: row-start / column-start / row-end / column-end */
            grid-area: 1 / 1 / 3 / 4;
        }

        .grid-con div {
            width: 80%;
            height: auto;

            background-color: beige;
            border: darkslategray solid 2px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, Helvetica, sans-serif;
        }

        .grid-con div:nth-child(2) {
            grid-area: 1 / 4 / 5 / 5;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .con {

            padding: 0.6em;
            box-sizing: border-box;
            min-height: 100vh;
            max-width: 100vw;

            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-rows: 10vh 1fr 5vh;
            grid-template-areas:
                ' header header header'
                'menu main right'
                'footer footer footer';
        }

        .con div {
            background-color: beige;
            border: 2px solid cadetblue;
        }

        .header {
           
            grid-area: header;

            display: flex;
            align-items: center;
            gap: 0.4em;
             
            padding-left: 0.7em;
        }
        .header div{
            border: none;
            text-transform: uppercase;
            font-family: Arial, Helvetica, sans-serif;
            transition: all 0.35 ease;
        }
        .header div:nth-child(3){
            margin-left: auto;
        }
        .header div:hover{
            text-shadow: 2px 2px 15px black;
        }
        .menu {
            grid-area: menu;
        }

        .main {
            grid-area: main;
        }

        .right {
            grid-area: right;
        }

        .footer {
            grid-area: footer;
        }
    </style>

</head>

<body>
    <div class="con">
        <div class="header">
            <div>Home </div>
            <div>Search</div>
            <div>log out</div>
        </div>
        <div class="menu">Menu</div>
        <div class="main">Main
            <div class="grid-con">
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>6</div>
                <div>7</div>
                <div>8</div>
            </div>
        </div>
        <div class="right">Right</div>
        <div class="footer">Footer</div>
    </div>

</html>
