<!DOCTYPE html>
<html lang="uk">
<head>
<style>
  .container {
    display: grid;
    gap: 10px;
    padding: 20px;
    border: 1px solid #ccc;
    max-width: 800px;
  }
  .image-box { background: #ddd; height: 100px; }
  .info-box { padding: 10px; }
  .btn-box { display: flex; justify-content: flex-end; }

  @media (min-width: 600px) {
    .container { grid-template-columns: 150px 1fr auto; align-items: center; }
  }
  @media (max-width: 599px) {
    .container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="image-box"></div>
  <div class="info-box">
    <div>UPLOADING 40%</div>
    <strong>Title of video</strong>
  </div>
  <div class="btn-box"><button>DONE</button></div>
</div>

</body>
</html>
