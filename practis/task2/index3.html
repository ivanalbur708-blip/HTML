<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Task2.2</title>
    <style>
        body {
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
}

.gallery-container {
    background-color: #fff;
    border: 1px solid #ccc;
    width: 500px;
    text-align: center;
}

header {
    border-bottom: 1px solid #ccc;
    padding: 10px;
}

h1 {
    font-size: 18px;
    margin: 0;
    letter-spacing: 1px;
}

.main-view {
    padding: 40px;
    height: 300px;
}

iframe {
    width: 100%;
    height: 100%;
    display: block;
}

.thumbnails {
    display: flex;
    border-top: 1px solid #ccc;
}

.thumbnails a {
    flex: 1;
    border-right: 1px solid #ccc;
    padding: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.3s;
}

.thumbnails a:last-child {
    border-right: none;
}

.thumbnails a:hover {
    background-color: #f9f9f9;
}

.thumbnails img {
    width: 40px;
    height: auto;
}
    </style>
</head>
<body>

    <div class="gallery-container">
        <header>
            <h1>CATS GALLERY</h1>
        </header>

        <main class="main-view">
           
            <iframe src="../../shade_resurses/cats/cat_box_256.png" name="full_image" frameborder="0"></iframe>
        </main>

        <footer class="thumbnails">
            <a href="../../shade_resurses/cats/cat_box_256.png" target="full_image"><img src="../../shade_resurses/cats/cat_box_256.png"></a>
            <a href="../../shade_resurses/cats/cat_cage_256.png" target="full_image"><img src="../../shade_resurses/cats/cat_cage_256.png"></a>
            <a href="../../shade_resurses/cats/cat_clean_256.png" target="full_image"><img src="../../shade_resurses/cats/cat_clean_256.png"></a>
            <a href="../../shade_resurses/cats/cat_eyes_256.png" target="full_image"><img src="../../shade_resurses/cats/cat_eyes_256.png"></a>
            <a href="../../shade_resurses/cats/cat_purr_256.png" target="full_image"><img src="../../shade_resurses/cats/cat_purr_256.png"></a>
            <a href="../../shade_resurses/cats/cat_tied_256.png" target="full_image"><img src="../../shade_resurses/cats/cat_tied_256.png"></a>
        </footer>
    </div>

</body>
</html>
