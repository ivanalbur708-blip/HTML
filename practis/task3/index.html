<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <style>
        .progress-container {
            width: 300px;
            height: 50px;
            border: 3px solid orange;
            position: relative;
            overflow: hidden;
            margin: 50px auto;
        }

        .progress-fill {
            width: 60px;
            height: 100%;
            background-color: orange;
            position: absolute;

            animation: move-progress 2s linear infinite;
        }

        @keyframes move-progress {
            0% {
                left: -60px;
            }

            100% {
                left: 300px;
            }
        }
    </style>
</head>

<body>
    <div class="progress-container">
        <div class="progress-fill"></div>
    </div>
</body>

</html>
