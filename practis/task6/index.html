<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6 - Product Grid</title>
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            padding: 20px;
        }

        .product-card {
            border: 1px solid #ccc;
            text-align: center;
            padding: 15px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .info h3 {
            font-size: 16px;
            margin: 10px 0 5px;
        }

        .info p {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .price {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .buy-btn:hover {
            background-color: #34495e;
        }

      
        @media (max-width: 800px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="product-grid">
        <div class="product-card">
