<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozetka - Головна</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ROZETKA</a>
        <input type="text" class="search-bar" placeholder="Я шукаю...">
        <a href="cart.html" class="btn">Кошик</a> 
    </header>

    <main class="container">
        <h1>Популярні товари</h1>
        <br>
        <div class="products-grid">
            <div class="product-card">
                <img src="https://content2.rozetka.com.ua/goods/images/big/485797273.jpg" alt="Acer Nitro">
                <h3>Ноутбук Acer Nitro</h3>
                <p class="price">35 999 грн</p>
                <a href="product.html" class="btn">Детальніше</a>
            </div>
            <div class="product-card">
                <img src="https://content2.rozetka.com.ua/goods/images/big/618192148.jpg" alt="Мишка">
                <h3>Ігрова миша</h3>
                <p class="price">1 299 грн</p>
                <a href="product.html" class="btn">Детальніше</a>
            </div>
            <div class="product-card">
                <img src="https://content1.rozetka.com.ua/goods/images/big/514743406.png" alt="Клавіатура">
                <h3>Механічна клавіатура</h3>
                <p class="price">2 499 грн</p>
                <a href="product.html" class="btn">Детальніше</a>
            </div>
        </div>
    </main>
</body>
</html>
